name: Run Tests and Publish Allure Report

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run tests
        run: mvn clean test

      - name: Get Allure history
        run: |
          git clone https://github.com/${{ github.repository }}.git gh-pages
          if [ -d "gh-pages/history" ]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/* target/allure-results/history/
          fi

      - name: Generate Allure Report
        run: |
          npm install -g allure-commandline --save-dev
          allure generate target/allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report

      - name: Debug everything
        run: |
          echo "=== TARGET ==="
          ls -la target || true
          echo "=== ALLURE RESULTS ==="
          ls -la target/allure-results || true
          echo "=== REPORT ==="
          ls -la allure-report || true